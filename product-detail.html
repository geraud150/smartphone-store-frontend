<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Détails du Produit - Smartphone Store</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg: #ffffff;
            --surface: #ffffff;
            --surface2: #f5f5f7;
            --border: #e8e8e8;
            --accent: #2563eb;
            --accent-dim: rgba(37, 99, 235, 0.08);
            --success: #16a34a;
            --success-dim: rgba(22, 163, 74, 0.08);
            --danger: #dc2626;
            --danger-dim: rgba(220, 38, 38, 0.07);
            --text: #1a1a1a;
            --text-muted: #9ca3af;
            --text-sub: #6b7280;
            --shadow-hover: 0 10px 32px rgba(0,0,0,0.11);
        }

        html { scroll-behavior: smooth; }

        body {
            background: var(--bg);
            font-family: 'DM Sans', sans-serif;
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* ── NAVBAR ── */
        nav {
            position: sticky; top: 0; z-index: 100;
            background: rgba(255,255,255,0.92);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
            padding: 0 40px; height: 64px;
            display: flex; align-items: center; justify-content: space-between;
        }

        .brand {
            font-family: 'Syne', sans-serif;
            font-weight: 800; font-size: 1.15rem;
            letter-spacing: -0.02em;
            color: var(--text); text-decoration: none;
            display: flex; align-items: center; gap: 8px;
        }

        .brand-dot { width: 8px; height: 8px; background: var(--accent); border-radius: 50%; display: inline-block; }

        .nav-links { display: flex; align-items: center; gap: 8px; list-style: none; }

        .nav-links a {
            color: var(--text-sub); text-decoration: none;
            font-size: 0.875rem; font-weight: 500;
            padding: 6px 14px; border-radius: 20px; transition: all 0.2s;
        }

        .nav-links a:hover, .nav-links a.active { color: var(--text); background: var(--surface2); }

        .nav-cart {
            position: relative; color: var(--text);
            padding: 8px 14px; border-radius: 20px;
            transition: background 0.2s; text-decoration: none;
        }

        .nav-cart:hover { background: var(--surface2); }

        .cart-badge {
            position: absolute; top: 2px; right: 2px;
            background: var(--accent); color: #fff;
            font-size: 0.6rem; font-weight: 700;
            width: 16px; height: 16px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
        }

        .btn-login {
            background: var(--accent); color: #fff;
            font-size: 0.8rem; font-weight: 600;
            padding: 8px 20px; border-radius: 20px;
            text-decoration: none; transition: opacity 0.2s; margin-left: 8px;
        }

        .btn-login:hover { opacity: 0.85; }

        /* ── MAIN ── */
        .main-content {
            flex-grow: 1;
            max-width: 1100px;
            margin: 0 auto; width: 100%;
            padding: 48px 40px 80px;
        }

        /* ── LOADING ── */
        #loading { text-align: center; padding: 80px 20px; }

        .spinner {
            width: 36px; height: 36px;
            border: 3px solid var(--border);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            margin: 0 auto 14px;
        }

        @keyframes spin { to { transform: rotate(360deg); } }
        #loading p { color: var(--text-muted); font-size: 0.9rem; }

        /* ── BREADCRUMB ── */
        .breadcrumb {
            display: flex; align-items: center; gap: 8px;
            font-size: 0.8rem;
            color: var(--text-muted);
            margin-bottom: 24px;
            list-style: none;
        }

        .breadcrumb a { color: var(--text-sub); text-decoration: none; transition: color 0.2s; }
        .breadcrumb a:hover { color: var(--accent); }
        .breadcrumb-sep { color: var(--text-muted); }
        .breadcrumb-active { color: var(--text); font-weight: 500; }

        /* ── PRODUCT LAYOUT ── */
        #product-details {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 48px;
            align-items: start;
            animation: fadeUp 0.45s ease both;
        }

        #product-details.d-none { display: none; }

        /* ── IMAGE CARD ── */
        .image-card {
            background: var(--surface2);
            border: 1.5px solid var(--border);
            border-radius: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 420px;
            padding: 40px;
            position: sticky;
            top: 84px;
            overflow: hidden;
        }

        .image-card img {
            max-width: 100%;
            max-height: 380px;
            object-fit: contain;
            transition: transform 0.4s ease;
        }

        .image-card:hover img { transform: scale(1.04); }

        /* ── INFO COL ── */
        .info-col { display: flex; flex-direction: column; gap: 20px; }

        /* ── STOCK BADGE ── */
        .stock-badge {
            display: inline-flex; align-items: center; gap: 6px;
            font-size: 0.75rem; font-weight: 700;
            padding: 5px 14px; border-radius: 20px;
        }

        .stock-badge.in-stock {
            background: var(--success-dim);
            color: var(--success);
        }

        .stock-badge.out-stock {
            background: var(--danger-dim);
            color: var(--danger);
        }

        .stock-badge::before {
            content: '';
            width: 6px; height: 6px;
            border-radius: 50%;
            background: currentColor;
        }

        /* ── TITLE ── */
        .product-title {
            font-family: 'Syne', sans-serif;
            font-size: clamp(1.8rem, 3.5vw, 2.4rem);
            font-weight: 800;
            letter-spacing: -0.03em;
            line-height: 1.1;
        }

        /* ── PRICE ── */
        .price-tag {
            font-family: 'Syne', sans-serif;
            font-size: 2.2rem;
            font-weight: 800;
            letter-spacing: -0.03em;
            color: var(--accent);
        }

        /* ── DESCRIPTION ── */
        .description-card {
            background: var(--surface2);
            border: 1.5px solid var(--border);
            border-radius: 16px;
            border-left: 4px solid var(--accent);
            padding: 20px;
        }

        .description-card h5 {
            font-family: 'Syne', sans-serif;
            font-size: 0.85rem;
            font-weight: 700;
            margin-bottom: 10px;
            display: flex; align-items: center; gap: 8px;
            color: var(--text);
        }

        .description-card h5 i { color: var(--accent); }

        .description-card p {
            font-size: 0.9rem;
            color: var(--text-sub);
            line-height: 1.7;
            margin: 0;
        }

        /* ── ACTION CARD ── */
        .action-card {
            background: var(--surface);
            border: 1.5px solid var(--border);
            border-radius: 20px;
            padding: 24px;
        }

        .qty-row {
            display: grid;
            grid-template-columns: 160px 1fr;
            gap: 14px;
            align-items: center;
        }

        .qty-group { display: flex; flex-direction: column; gap: 6px; }

        .qty-group label {
            font-size: 0.7rem; font-weight: 700;
            letter-spacing: 0.07em; text-transform: uppercase;
            color: var(--text-muted);
        }

        .qty-select {
            background: var(--surface2);
            border: 1.5px solid var(--border);
            border-radius: 12px;
            padding: 10px 14px;
            height: 48px;
            font-family: 'DM Sans', sans-serif;
            font-size: 0.9rem;
            color: var(--text);
            outline: none;
            cursor: pointer;
            transition: border-color 0.2s;
            width: 100%;
        }

        .qty-select:focus { border-color: var(--accent); }
        .qty-select[type=number] {
         appearance: textfield;
        -moz-appearance: textfield;
    }

        .qty-select[type=number]::-webkit-outer-spin-button,
        .qty-select[type=number]::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }

        /* ── BUTTONS ── */
        .btn-add {
            display: flex; align-items: center; justify-content: center; gap: 10px;
            width: 100%;
            background: var(--accent); color: #fff;
            font-family: 'DM Sans', sans-serif;
            font-size: 0.9rem; font-weight: 600;
            padding: 14px 20px; border-radius: 30px;
            height: 48px;
            border: none; cursor: pointer;
            transition: all 0.25s;
            box-shadow: 0 4px 16px rgba(37,99,235,0.22);
        }

        .btn-add:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(37,99,235,0.32);
        }

        .btn-add:disabled {
            background: var(--surface2);
            color: var(--text-muted);
            box-shadow: none;
            cursor: not-allowed;
            border: 1.5px solid var(--border);
        }

        .btn-add.success {
            background: var(--success);
            box-shadow: 0 4px 16px rgba(22,163,74,0.22);
        }

        /* ── ERROR ── */
        .error-box {
            background: var(--danger-dim);
            border: 1.5px solid rgba(220,38,38,0.2);
            border-radius: 16px;
            padding: 20px 24px;
            text-align: center;
            color: var(--text-sub);
            font-size: 0.9rem;
        }

        .error-box i { color: var(--danger); font-size: 1.3rem; margin-bottom: 8px; display: block; }

        /* ── FOOTER ── */
        footer {
            background: var(--surface2);
            border-top: 1px solid var(--border);
            padding: 32px 40px;
            text-align: center;
            color: var(--text-sub); font-size: 0.8rem;
        }

        /* ── ANIMATIONS ── */
        @keyframes fadeUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }

        /* ── RESPONSIVE ── */
        @media (max-width: 860px) {
            #product-details { grid-template-columns: 1fr; gap: 28px; }
            .image-card { position: static; min-height: 300px; }
            nav { padding: 0 20px; }
            .main-content { padding: 32px 20px 60px; }
            .qty-row { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <!-- NAVBAR -->
    <nav>
        <a class="brand" href="index.html">
            <span class="brand-dot"></span>Smartphone Store
        </a>
        <ul class="nav-links">
            <li><a href="index.html">Accueil</a></li>
            <li><a href="product.html">Produits</a></li>
            <li>
                <a href="cart.html" class="nav-cart">
                    <i class="fas fa-bag-shopping"></i>
                    <span class="cart-badge" id="cartBadge" style="display:none">0</span>
                </a>
            </li>
            <li><a href="orders.html"><i class="fas fa-box"></i> Commandes</a></li>
            <li id="authSection">
                <a id="loginLink" class="btn-login" href="login.html">Connexion</a>
            </li>
        </ul>
    </nav>

    <!-- MAIN -->
    <div class="main-content">

        <!-- LOADING -->
        <div id="loading">
            <div class="spinner"></div>
            <p>Chargement des informations du produit...</p>
        </div>

        <!-- PRODUIT -->
        <div id="product-details" class="d-none">

            <!-- BREADCRUMB -->
            <div style="grid-column: 1 / -1;">
                <ol class="breadcrumb">
                    <li><a href="product.html">Catalogue</a></li>
                    <li class="breadcrumb-sep"><i class="fas fa-chevron-right" style="font-size:0.65rem"></i></li>
                    <li class="breadcrumb-active" id="p-category-breadcrumb">Smartphone</li>
                </ol>
            </div>

            <!-- IMAGE -->
            <div class="image-card">
                <img id="p-image" src="" alt="Image produit">
            </div>

            <!-- INFOS -->
            <div class="info-col">
                <span id="p-stock-badge" class="stock-badge in-stock">En stock</span>

                <h1 class="product-title" id="p-title">Nom du Smartphone</h1>

                <div class="price-tag"><span id="p-price">0.00</span> €</div>

                <div class="description-card">
                    <h5><i class="fas fa-info-circle"></i> Description</h5>
                    <p id="p-description">Chargement de la description...</p>
                </div>

                <div class="action-card">
                    <div class="qty-row">
                        <div class="qty-group">
                            <label for="p-quantity">Quantité</label>
                            <input id="p-quantity" type="number" class="qty-select" min="1" value="1" inputmode="numeric">
                            <small id="p-qty-help" style="display:block;margin-top:0px;color:#6b7280;font-size:0.85rem;"></small>
                        </div>
                        <button id="add-btn" class="btn-add">
                            <i class="fas fa-cart-plus"></i> Ajouter au panier
                        </button>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <!-- FOOTER -->
    <footer>
        <p>© 2024 Smartphone Store — Tous droits réservés.</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="JS/main.js"></script>
    <script>
        const API_URL = "https://smartphone-store-backend.onrender.com/api";

        document.addEventListener('DOMContentLoaded', function() {
            updateAuthDisplay();
            updateCartBadge();

            const params = new URLSearchParams(window.location.search);
            const productId = params.get('id');

            if (productId) {
                fetchProductDetails(productId);
            } else {
                window.location.href = 'product.html';
            }
        });

        async function fetchProductDetails(id) {
            try {
                const response = await fetch(`${API_URL}/products/${id}`);
                if (!response.ok) throw new Error("Produit introuvable");
                const product = await response.json();
                renderProductData(product);
            } catch (err) {
                document.getElementById('loading').innerHTML = `
                    <div class="error-box">
                        <i class="fas fa-circle-exclamation"></i>
                        Impossible de charger les détails du produit. Vérifiez votre connexion au serveur.
                    </div>`;
            }
        }

        function renderProductData(p) {
            document.getElementById('p-title').textContent = p.nom;
            document.getElementById('p-price').textContent = parseFloat(p.prix).toFixed(2);
            document.getElementById('p-description').textContent = p.description || "Aucune description détaillée n'est disponible pour cet article.";
            document.getElementById('p-image').src = p.url_image || 'https://placehold.co/500x500/f5f5f7/9ca3af?text=Image+Indisponible';
            document.getElementById('p-category-breadcrumb').textContent = p.categorie || "Smartphone";

            const badge = document.getElementById('p-stock-badge');
            const btn = document.getElementById('add-btn');
            const quantityInput = document.getElementById('p-quantity');
            const qtyHelp = document.getElementById('p-qty-help');


            if (p.stock_actuel <= 0) {
                badge.textContent = "Rupture de stock";
                badge.className = "stock-badge out-stock";
                btn.disabled = true;
                btn.innerHTML = `<i class="fas fa-times-circle"></i> Indisponible`;
                quantityInput.disabled = true;
                quantityInput.value = 0;
                if (qtyHelp) qtyHelp.textContent = "Stock �puis�.";
            } else {
                badge.textContent = `En stock (${p.stock_actuel})`;
                badge.className = "stock-badge in-stock";

                quantityInput.disabled = false;
                quantityInput.min = 1;
                quantityInput.max = p.stock_actuel;
                quantityInput.value = 1;
                if (qtyHelp) qtyHelp.textContent = `Max: ${p.stock_actuel}`;

                quantityInput.addEventListener('input', () => {
                    const maxQty = parseInt(quantityInput.max, 10) || p.stock_actuel;
                    let current = parseInt(quantityInput.value, 10);
                    if (Number.isNaN(current) || current < 1) current = 1;
                    if (current > maxQty) {
                        quantityInput.value = maxQty;
                        showToast(`Quantité max disponible : ${maxQty}`);
                    }
                });

                btn.onclick = () => {
                    const qty = parseInt(quantityInput.value, 10);
                    processAddToCart(p, qty);
                };
            }

            document.getElementById('loading').style.display = 'none';
            document.getElementById('product-details').classList.remove('d-none');
        }

        function processAddToCart(p, qty) {
             if (qty > p.stock_actuel) {
                showToast(`Quantit� max disponible : ${p.stock_actuel}`);
                return;
   }
            let cart = JSON.parse(localStorage.getItem('shoppingCart')) || [];
            const existingIndex = cart.findIndex(item => item.id === p.id_produit);

            if (existingIndex > -1) {
                cart[existingIndex].quantity += qty;
            } else {
                cart.push({ id: p.id_produit, name: p.nom, price: p.prix, image: p.url_image, quantity: qty });
            }

            localStorage.setItem('shoppingCart', JSON.stringify(cart));
            updateCartBadge();

            const btn = document.getElementById('add-btn');
            const originalHTML = btn.innerHTML;
            btn.innerHTML = `<i class="fas fa-check-circle"></i> Ajouté au panier !`;
            btn.classList.add('success');
            btn.disabled = true;

            setTimeout(() => {
                btn.innerHTML = originalHTML;
                btn.classList.remove('success');
                btn.disabled = false;
            }, 2500);
        }

        function updateCartBadge() {
            const cart = JSON.parse(localStorage.getItem('shoppingCart') || localStorage.getItem('cart') || '[]');
            const total = cart.reduce((acc, item) => acc + item.quantity, 0);
            const badge = document.getElementById('cartBadge');
            if (badge) {
                badge.textContent = total;
                badge.style.display = total > 0 ? 'flex' : 'none';
            }
        }

        function updateAuthDisplay() {
            const userName = localStorage.getItem('userName');
            const loginLink = document.getElementById('loginLink');
            if (userName && loginLink) {
                loginLink.textContent = userName;
                loginLink.href = 'profile.html';
            }
        }

        function showToast(message) {
            let toast = document.getElementById('toast');
            if (!toast) {
                toast = document.createElement('div');
                toast.id = 'toast';
                toast.style.position = 'fixed';
                toast.style.top = '16px';
                toast.style.right = '16px';
                toast.style.background = '#dc2626';
                toast.style.color = '#fff';
                toast.style.padding = '12px 16px';
                toast.style.borderRadius = '10px';
                toast.style.boxShadow = '0 8px 24px rgba(0,0,0,.2)';
                toast.style.fontSize = '.95rem';
                toast.style.display = 'none';
                toast.style.zIndex = '9999';
                document.body.appendChild(toast);
            }
            toast.textContent = message;
            toast.style.display = 'block';
            clearTimeout(window.__toastTimer);
            window.__toastTimer = setTimeout(() => {
                toast.style.display = 'none';
            }, 2500);
        }
</script>
 <div id="toast" style="
  position:fixed; top:16px; right:16px;
  background:#dc2626; color:#fff; padding:12px 16px;
  border-radius:10px; box-shadow:0 8px 24px rgba(0,0,0,.2);
  font-size:.95rem; display:none; z-index:9999;
"></div>

</body>
</html>
