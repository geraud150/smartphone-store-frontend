<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inscription - Smartphone Store</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg: #ffffff;
            --surface: #ffffff;
            --surface2: #f5f5f7;
            --border: #e8e8e8;
            --accent: #2563eb;
            --accent-dim: rgba(37, 99, 235, 0.08);
            --text: #1a1a1a;
            --text-muted: #9ca3af;
            --text-sub: #6b7280;
        }

        html { scroll-behavior: smooth; }

        body {
            background: var(--bg);
            font-family: 'DM Sans', sans-serif;
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* ── NAVBAR ── */
        nav {
            position: sticky; top: 0; z-index: 100;
            background: rgba(255,255,255,0.92);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
            padding: 0 40px; height: 64px;
            display: flex; align-items: center; justify-content: space-between;
        }

        .brand {
            font-family: 'Syne', sans-serif;
            font-weight: 800; font-size: 1.15rem;
            letter-spacing: -0.02em;
            color: var(--text); text-decoration: none;
            display: flex; align-items: center; gap: 8px;
        }

        .brand-dot { width: 8px; height: 8px; background: var(--accent); border-radius: 50%; display: inline-block; }

        .nav-links { display: flex; align-items: center; gap: 8px; list-style: none; }

        .nav-links a {
            color: var(--text-sub); text-decoration: none;
            font-size: 0.875rem; font-weight: 500;
            padding: 6px 14px; border-radius: 20px; transition: all 0.2s;
        }

        .nav-links a:hover, .nav-links a.active { color: var(--text); background: var(--surface2); }

        .nav-cart {
            position: relative; color: var(--text);
            padding: 8px 14px; border-radius: 20px;
            transition: background 0.2s; text-decoration: none;
        }

        .nav-cart:hover { background: var(--surface2); }

        .cart-badge {
            position: absolute; top: 2px; right: 2px;
            background: var(--accent); color: #fff;
            font-size: 0.6rem; font-weight: 700;
            width: 16px; height: 16px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
        }

        .btn-login-nav {
            background: var(--accent); color: #fff;
            font-size: 0.8rem; font-weight: 600;
            padding: 8px 20px; border-radius: 20px;
            text-decoration: none; transition: opacity 0.2s; margin-left: 8px;
        }

        .btn-login-nav:hover { opacity: 0.85; }

        /* ── FORM CONTAINER ── */
        .form-container {
            flex-grow: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 48px 20px;
            background: var(--surface2);
        }

        /* ── REGISTER CARD ── */
        .register-card {
            background: var(--surface);
            border: 1.5px solid var(--border);
            border-radius: 24px;
            padding: 40px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 8px 40px rgba(0,0,0,0.08);
            animation: fadeUp 0.45s ease both;
        }

        .register-icon {
            width: 52px; height: 52px;
            background: var(--accent-dim);
            border-radius: 16px;
            display: flex; align-items: center; justify-content: center;
            color: var(--accent); font-size: 1.2rem;
            margin: 0 auto 20px;
        }

        .register-card h2 {
            font-family: 'Syne', sans-serif;
            font-size: 1.5rem; font-weight: 800;
            letter-spacing: -0.02em;
            text-align: center;
            margin-bottom: 6px;
        }

        .register-card .subtitle {
            text-align: center;
            color: var(--text-sub);
            font-size: 0.88rem;
            margin-bottom: 28px;
        }

        /* ── AUTH MESSAGE ── */
        #authMessage { margin-bottom: 16px; }

        /* ── FORM GROUPS ── */
        .form-group {
            display: flex; flex-direction: column; gap: 6px;
            margin-bottom: 16px;
        }

        .form-group label {
            font-size: 0.72rem;
            font-weight: 700;
            letter-spacing: 0.07em;
            text-transform: uppercase;
            color: var(--text-muted);
            display: flex; align-items: center; gap: 6px;
        }

        .form-group label i { font-size: 0.7rem; }

        .form-group input {
            background: var(--surface2);
            border: 1.5px solid var(--border);
            border-radius: 12px;
            padding: 12px 16px;
            font-family: 'DM Sans', sans-serif;
            font-size: 0.9rem;
            color: var(--text);
            transition: all 0.2s;
            outline: none;
            width: 100%;
        }

        .form-group input:focus {
            border-color: var(--accent);
            background: #fff;
            box-shadow: 0 0 0 3px var(--accent-dim);
        }

        .form-group input::placeholder { color: var(--text-muted); }

        /* ── SUBMIT BUTTON ── */
        .btn-submit {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            width: 100%;
            background: var(--accent);
            color: #fff;
            font-family: 'DM Sans', sans-serif;
            font-size: 0.9rem; font-weight: 600;
            padding: 14px 20px;
            border-radius: 30px;
            border: none; cursor: pointer;
            transition: all 0.25s;
            margin-top: 8px;
            box-shadow: 0 4px 16px rgba(37,99,235,0.22);
        }

        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(37,99,235,0.32);
        }

        /* ── LOGIN LINK ── */
        .login-link {
            text-align: center;
            margin-top: 20px;
            font-size: 0.85rem;
            color: var(--text-sub);
        }

        .login-link a {
            color: var(--accent);
            font-weight: 700;
            text-decoration: none;
        }

        .login-link a:hover { text-decoration: underline; }

        /* ── FOOTER ── */
        footer {
            background: var(--surface2);
            border-top: 1px solid var(--border);
            padding: 32px 40px;
            text-align: center;
            color: var(--text-sub); font-size: 0.8rem;
        }

        /* ── ANIMATIONS ── */
        @keyframes fadeUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        /* ── RESPONSIVE ── */
        @media (max-width: 700px) {
            nav { padding: 0 20px; }
            .register-card { padding: 28px 24px; }
        }
    </style>
</head>
<body>

    <!-- NAVBAR -->
    <nav>
        <a class="brand" href="index.html">
            <span class="brand-dot"></span>Smartphone Store
        </a>
        <ul class="nav-links">
            <li><a href="index.html">Accueil</a></li>
            <li><a href="product.html">Produits</a></li>
            <li>
                <a href="cart.html" class="nav-cart">
                    <i class="fas fa-bag-shopping"></i>
                    <span class="cart-badge" id="cartBadge" style="display:none">0</span>
                </a>
            </li>
            <li><a href="orders.html"><i class="fas fa-box"></i> Commandes</a></li>
            <li>
                <a href="login.html" class="btn-login-nav" id="loginLink">Connexion</a>
            </li>
        </ul>
    </nav>

    <!-- REGISTER FORM -->
    <div class="form-container">
        <div class="register-card">
            <div class="register-icon"><i class="fas fa-user-plus"></i></div>
            <h2>Créer un compte</h2>
            <p class="subtitle">Rejoignez-nous pour profiter de toutes nos offres.</p>

            <form id="registerForm" method="POST">
                <div id="authMessage"></div>

                <div class="form-group">
                    <label for="full_name"><i class="fas fa-user"></i> Nom complet</label>
                    <input type="text" id="full_name" placeholder="Jean Dupont" required>
                </div>

                <div class="form-group">
                    <label for="email"><i class="fas fa-envelope"></i> Adresse e-mail</label>
                    <input type="email" id="email" placeholder="jean.dupont@email.com" required>
                </div>

                <div class="form-group">
                    <label for="password"><i class="fas fa-lock"></i> Mot de passe</label>
                    <input type="password" id="password" placeholder="••••••••" required>
                </div>

                <button type="submit" class="btn-submit">
                    <i class="fas fa-user-plus"></i> S'inscrire
                </button>
            </form>

            <p class="login-link">
                Déjà un compte ? <a href="login.html">Se connecter ici</a>
            </p>
        </div>
    </div>

    <!-- FOOTER -->
    <footer>
        <p>© 2024 Smartphone Store — Tous droits réservés.</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="./JS/main.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const registerForm = document.getElementById('registerForm');
            if (registerForm && typeof handleRegister === 'function') {
                registerForm.addEventListener('submit', handleRegister);
            }
        });
    </script>
</body>
</html>
